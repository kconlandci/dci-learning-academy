name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Firebase Web SDK config — these are client-side values baked into
          # the JS bundle at build time. They are NOT secrets; Firestore
          # access is enforced by security rules, not by hiding this config.
          # Hardcoded here rather than using GitHub Secrets because rotation
          # is rare and keeping them visible avoids "why is my build broken"
          # debugging when someone forgets to set a secret.
          VITE_FIREBASE_API_KEY: AIzaSyDUHpKW-1u2APXWVpMp3Ua0saHXuu4K5IE
          VITE_FIREBASE_AUTH_DOMAIN: dci-learning-academy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dci-learning-academy
          VITE_FIREBASE_STORAGE_BUCKET: dci-learning-academy.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "998146842887"
          VITE_FIREBASE_APP_ID: "1:998146842887:web:bb8eb36b241503aac665a2"

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/dci-learning-academy

          # Portal → site root
          cp -r apps/portal/dist/* _site/dci-learning-academy/

          # Each non-portal app → /dci-learning-academy/<name>/
          for app_dir in apps/*/; do
            app_name=$(basename "$app_dir")
            [ "$app_name" = "portal" ] && continue
            [ -d "$app_dir/dist" ] || continue
            mkdir -p "_site/dci-learning-academy/$app_name"
            cp -r "$app_dir/dist/"* "_site/dci-learning-academy/$app_name/"
          done

          # SPA deep-link support: GitHub Pages serves 404.html when a path
          # has no matching file. By placing a copy of the portal's index.html
          # at the Pages root, React Router still boots and resolves the
          # client-side route (e.g. /dci-learning-academy/instructor).
          # The portal's built HTML references assets via absolute paths
          # (/dci-learning-academy/assets/...) so it works from any URL.
          # Module subpaths (/cybersecurity/) have their own index.html and
          # won't hit this fallback.
          cp apps/portal/dist/index.html _site/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
