<script>
  // SPA deep-link decoder — companion to scripts/pages/404.html.
  //
  // The repo-root 404.html redirects /dci-learning-academy/<module>/deep/path
  // to /dci-learning-academy/<module>/?/deep/path so the correct SPA shell
  // loads. This script runs before React mounts, decodes the ?/... query
  // back into a path, and calls history.replaceState so React Router sees
  // the original URL on first render.
  //
  // Based on https://github.com/rafgraph/spa-github-pages (MIT).
  (function (l) {
    if (l.search[1] === "/") {
      var decoded = l.search
        .slice(1)
        .split("&")
        .map(function (s) {
          return s.replace(/~and~/g, "&");
        })
        .join("?");
      window.history.replaceState(
        null,
        null,
        l.pathname.slice(0, -1) + decoded + l.hash,
      );
    }
  })(window.location);
</script>
